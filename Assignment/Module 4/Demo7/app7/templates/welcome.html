<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Premium Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body
    class="text-white min-h-screen flex items-center justify-center overflow-y-auto py-8 relative font-sans selection:bg-white selection:text-black">

    <div class="ambient-glow"></div>

    <div class="w-full max-w-lg p-8 relative z-10 text-center animate-slide-up">

        <div class="mb-10">
            <h1 class="text-4xl md:text-5xl font-bold tracking-widest uppercase mb-4 animate-slide-up delay-100">
                Welcome,<br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 font-extrabold">{{ username }}</span>
            </h1>
            <p class="text-gray-400 text-base tracking-wider animate-slide-up delay-200">
                You have successfully authenticated into the exclusive network.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 animate-slide-up delay-300">
            <a href="/showdata/"
                class="w-full sm:w-auto bg-white text-black font-bold uppercase tracking-widest px-8 py-4 hover:bg-gray-200 hover:-translate-y-1 hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] transition-all duration-300">
                Manage Database
            </a>
            <a href="/logout/"
                class="w-full sm:w-auto border border-white text-white font-bold uppercase tracking-widest px-8 py-4 hover:bg-white hover:text-black hover:-translate-y-1 hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] transition-all duration-300">
                Sign Out
            </a>
        </div>

    </div>

    <script src="/static/js/main.js"></script>
</body>

</html>
