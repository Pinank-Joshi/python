<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Premium Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body
    class="text-white min-h-screen flex items-center justify-center overflow-y-auto py-8 relative font-sans selection:bg-white selection:text-black">

    <div class="ambient-glow"></div>

    <div class="w-full max-w-md p-8 relative z-10 animate-slide-up">

        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-wider uppercase mb-2 animate-slide-up delay-100">Social
                Media<br>Profile Manager</h1>
            <p class="text-gray-400 text-sm tracking-wide animate-slide-up delay-200">Enter your credentials to
                continue.</p>
        </div>

        <form action="#" method="POST" class="space-y-6">
            {% csrf_token %}

            {% if error %}
            <div
                class="bg-red-500/10 border border-red-500/30 text-red-200 px-4 py-3 text-center text-sm font-medium tracking-wide animate-slide-up shadow-lg">
                {{ error }}
            </div>
            {% endif %}

            <div class="animate-slide-up delay-200">
                <label for="email" class="block text-xs font-semibold uppercase tracking-wider mb-2 text-gray-300">Email
                    Address</label>
                <input type="email" id="email" name="email" required
                    class="w-full bg-white text-black px-4 py-3 outline-none border border-transparent focus:border-gray-500 focus:ring-4 focus:ring-white/20 transition-all duration-300 shadow-lg placeholder-gray-500"
                    placeholder="name@example.com">
            </div>

            <div class="animate-slide-up delay-300">
                <label for="password"
                    class="block text-xs font-semibold uppercase tracking-wider mb-2 text-gray-300">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-white text-black px-4 py-3 outline-none border border-transparent focus:border-gray-500 focus:ring-4 focus:ring-white/20 transition-all duration-300 shadow-lg placeholder-gray-500"
                    placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between animate-slide-up delay-300 mt-4">
                <label
                    class="flex items-center text-sm text-gray-400 cursor-pointer hover:text-white transition-colors">
                    <input type="checkbox" class="mr-2 accent-white w-4 h-4">
                    Remember me
                </label>
                <a href="#"
                    class="text-sm text-gray-400 hover:text-white transition-colors underline-offset-4 hover:underline">Forgot
                    Password?</a>
            </div>

            <button type="submit"
                class="w-full bg-white text-black font-bold uppercase tracking-widest py-4 mt-8 hover:bg-gray-200 hover:-translate-y-1 hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] transition-all duration-300 animate-slide-up delay-300">
                Sign In
            </button>
        </form>

        <p class="text-center text-gray-400 text-sm mt-8 animate-slide-up delay-300">
            Don't have an account? <a href="/signup"
                class="text-white font-semibold hover:underline underline-offset-4 transition-all">Request Access</a>
        </p>
    </div>

    <script src="/static/js/main.js"></script>
</body>

</html>
