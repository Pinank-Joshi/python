<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile | Premium Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body
    class="text-white min-h-screen flex items-center justify-center overflow-y-auto py-8 relative font-sans selection:bg-white selection:text-black">

    <div class="ambient-glow"></div>

    <div class="w-full max-w-md p-8 relative z-10 animate-slide-up">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold tracking-widest uppercase mb-2 animate-slide-up delay-100">Update Profile</h1>
            <p class="text-gray-400 text-sm tracking-wide animate-slide-up delay-200">Modify user information.</p>
        </div>

        <form action="#" method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Pass existing password as hidden field so form validation succeeds -->
            <input type="hidden" name="password" value="{{ profile.password }}">

            <div class="animate-slide-up delay-100">
                <label for="name" class="block text-xs font-semibold uppercase tracking-wider mb-2 text-gray-300">Full
                    Name</label>
                <input type="text" id="name" name="name" value="{{ profile.name }}" required
                    class="w-full bg-white text-black px-4 py-3 outline-none border border-transparent focus:border-gray-500 focus:ring-4 focus:ring-white/20 transition-all duration-300 shadow-lg placeholder-gray-500"
                    placeholder="John Doe">
            </div>

            <div class="animate-slide-up delay-200">
                <label for="email" class="block text-xs font-semibold uppercase tracking-wider mb-2 text-gray-300">Email
                    Address</label>
                <input type="email" id="email" name="email" value="{{ profile.email }}" required
                    class="w-full bg-white text-black px-4 py-3 outline-none border border-transparent focus:border-gray-500 focus:ring-4 focus:ring-white/20 transition-all duration-300 shadow-lg placeholder-gray-500"
                    placeholder="name@example.com">
            </div>

            <div class="animate-slide-up delay-200">
                <label for="age"
                    class="block text-xs font-semibold uppercase tracking-wider mb-2 text-gray-300">Age</label>
                <input type="number" id="age" name="age" value="{{ profile.age }}" required min="1" max="120"
                    class="w-full bg-white text-black px-4 py-3 outline-none border border-transparent focus:border-gray-500 focus:ring-4 focus:ring-white/20 transition-all duration-300 shadow-lg placeholder-gray-500"
                    placeholder="25">
            </div>

            <button type="submit"
                class="w-full bg-white text-black font-bold uppercase tracking-widest py-4 mt-6 hover:bg-gray-200 hover:-translate-y-1 hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] transition-all duration-300 animate-slide-up delay-300">
                Update
            </button>
        </form>

        <p class="text-center text-gray-400 text-sm mt-6 animate-slide-up delay-300">
            <a href="/showdata/"
                class="text-white font-semibold hover:underline underline-offset-4 transition-all">Cancel & Return</a>
        </p>
    </div>

    <script src="/static/js/main.js"></script>
</body>

</html>
